name: Supertrend Alert Bot

on:
  schedule:
    # Runs every 15 minutes. GitHub Actions schedules can lag by several
    # minutes during high load - this is a free-tier limitation, not a bug.
    - cron: "*/15 * * * *"
  workflow_dispatch:   # lets you manually trigger a run from the Actions tab, for testing

permissions:
  contents: write   # needed so the workflow can commit the updated state.json back

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "supertrend-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update bot state [skip ci]"
          git push
